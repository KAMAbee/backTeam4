services:
  - type: web
    name: backteam4-api
    env: docker
    healthCheckPath: /api/schema/
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "True"
      - key: DATABASE_URL
        fromDatabase:
          name: backteam4-db
          property: connectionString

databases:
  - name: backteam4-db
